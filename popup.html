<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Site Blocker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111;
      color: #e0e0e0;
      width: 280px;
      padding: 1rem;
    }
    h1 { font-size: 1rem; font-weight: 600; margin-bottom: 1rem; color: #fff; }
    .input-row {
      display: flex;
      gap: 0.4rem;
      margin-bottom: 0.8rem;
    }
    input {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 5px;
      color: #e0e0e0;
      padding: 0.4rem 0.6rem;
      font-size: 0.85rem;
      outline: none;
    }
    input:focus { border-color: #555; }
    input::placeholder { color: #555; }
    button.add {
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 5px;
      color: #ccc;
      padding: 0.4rem 0.7rem;
      cursor: pointer;
      font-size: 0.85rem;
      white-space: nowrap;
    }
    button.add:hover { background: #333; color: #fff; }
    ul { list-style: none; }
    li {
      display: flex;
      flex-direction: column;
      align-items: stretch;
      gap: 0.25rem;
      padding: 0.4rem 0.5rem;
      border-radius: 5px;
      font-size: 0.85rem;
      font-family: monospace;
    }
    li:hover { background: #1a1a1a; }
    .site-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    li span { color: #ccc; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    li button {
      background: none;
      border: none;
      color: #555;
      cursor: pointer;
      font-size: 1rem;
      padding: 0 0.2rem;
      flex-shrink: 0;
    }
    li button:hover { color: #e55; }
    .days-row {
      display: flex;
      gap: 3px;
    }
    .day-btn {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 3px;
      color: #444;
      cursor: pointer;
      font-size: 0.65rem;
      font-weight: 600;
      width: 28px;
      height: 22px;
      padding: 0;
      flex-shrink: 0;
    }
    .day-btn.active {
      background: #1e3d1e;
      border-color: #3d8b3d;
      color: #6dbb6d;
    }
    .day-btn:hover { border-color: #555; color: #888; }
    .day-btn.active:hover { background: #162e16; color: #6dbb6d; }
    .empty { color: #555; font-size: 0.8rem; text-align: center; padding: 0.8rem 0; }
  </style>
</head>
<body>
  <h1>🚫 Site Blocker</h1>
  <div class="input-row">
    <input id="site-input" type="text" placeholder="ejemplo.com" />
    <button class="add" id="add-btn">Agregar</button>
  </div>
  <ul id="site-list"></ul>
  <script src="popup.js"></script>
</body>
</html>
