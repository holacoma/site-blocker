<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Blockdoze</title>
  <style>
    :root {
      --popup-bg: #fff;
      --popup-text: #111;
      --popup-text-muted: #666;
      --popup-text-label: #111;
      --popup-border: #e0e0e0;
      --popup-btn-bg: #f5f5f5;
      --popup-btn-border: #dde1e7;
      --popup-btn-color: #444;
      --popup-btn-hover-bg: #eef0f3;
      --popup-btn-hover-color: #111;
      --popup-btn-hover-border: #bbb;
      --popup-dot-unknown: #bbb;
      --popup-timer-color: #1e8e3e;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --popup-bg: #1c1c1e;
        --popup-text: #e0e0e0;
        --popup-text-muted: #aeaeb2;
        --popup-text-label: #e0e0e0;
        --popup-border: #3a3a3c;
        --popup-btn-bg: #2c2c2e;
        --popup-btn-border: #3a3a3c;
        --popup-btn-color: #ccc;
        --popup-btn-hover-bg: #3a3a3c;
        --popup-btn-hover-color: #fff;
        --popup-btn-hover-border: #636366;
        --popup-dot-unknown: #636366;
        --popup-timer-color: #6dbb6d;
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--popup-bg);
      color: var(--popup-text);
      width: 220px;
      min-width: 220px;
      padding: 1rem;
      overflow: visible;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.6rem 0;
      margin-bottom: 0.8rem;
      border-bottom: 1px solid var(--popup-border);
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.blocked  { background: #c0392b; }
    .dot.allowed  { background: #3d8b3d; }
    .dot.timer    { background: #8b7a00; }
    .dot.unknown  { background: var(--popup-dot-unknown); }
    .status-text  { font-size: 0.8rem; color: var(--popup-text-muted); line-height: 1.3; }
    .site-label   { font-family: monospace; color: var(--popup-text-label); font-size: 0.85rem; }
    .timer-label  { font-family: monospace; color: var(--popup-timer-color); font-size: 0.78rem; }
    .btn-row {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    button.settings,
    button.block-site {
      width: 100%;
      background: var(--popup-btn-bg);
      border: 1px solid var(--popup-btn-border);
      border-radius: 6px;
      color: var(--popup-btn-color);
      padding: 0.5rem;
      cursor: pointer;
      font-size: 0.82rem;
      text-align: center;
    }
    button.settings:hover,
    button.block-site:hover {
      background: var(--popup-btn-hover-bg);
      color: var(--popup-btn-hover-color);
      border-color: var(--popup-btn-hover-border);
    }
    button.block-site--pending {
      border-color: #c0392b;
      color: #c0392b;
    }
    button.block-site--pending:hover {
      background: #c0392b;
      color: #fff;
      border-color: #c0392b;
    }
  </style>
</head>
<body>
  <div class="status" id="status-area">
    <div class="dot unknown" id="dot"></div>
    <div class="status-text" id="status-text">Cargando...</div>
  </div>
  <div class="btn-row">
    <button class="block-site" id="block-site" style="display:none">(/) Block this site</button>
    <button class="settings" id="open-settings">&#9881; Settings</button>
  </div>
  <script type="module" src="popup.js"></script>
</body>
</html>
