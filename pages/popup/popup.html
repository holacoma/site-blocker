<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Site Blocker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #111;
      color: #e0e0e0;
      width: 220px;
      padding: 1rem;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.6rem 0;
      margin-bottom: 0.8rem;
      border-bottom: 1px solid #222;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.blocked  { background: #c0392b; }
    .dot.allowed  { background: #3d8b3d; }
    .dot.timer    { background: #8b7a00; }
    .dot.unknown  { background: #444; }
    .status-text  { font-size: 0.8rem; color: #aaa; line-height: 1.3; }
    .site-label   { font-family: monospace; color: #e0e0e0; font-size: 0.85rem; }
    .timer-label  { font-family: monospace; color: #6dbb6d; font-size: 0.78rem; }
    button.settings {
      width: 100%;
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 6px;
      color: #ccc;
      padding: 0.5rem;
      cursor: pointer;
      font-size: 0.82rem;
      text-align: center;
    }
    button.settings:hover { background: #2a2a2a; color: #fff; border-color: #555; }
  </style>
</head>
<body>
  <div class="status" id="status-area">
    <div class="dot unknown" id="dot"></div>
    <div class="status-text" id="status-text">Cargando...</div>
  </div>
  <button class="settings" id="open-settings">⚙ Abrir configuración</button>
  <script type="module" src="popup.js"></script>
</body>
</html>
