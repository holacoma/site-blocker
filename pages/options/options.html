<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Site Blocker — Configuración</title>
  <link id="theme-css" rel="stylesheet" href="theme-retro.css" />
</head>
<body>
  <div class="window main-window">
    <div class="title-bar">
      <div class="title-bar-text">Site Blocker — Configuración</div>
      <div class="theme-select-wrap">
        <label for="theme-select">Tema:</label>
        <select id="theme-select">
          <option value="retro">Retro (Win 98)</option>
          <option value="sober">Sobrio</option>
        </select>
      </div>
    </div>
    <div class="window-body">
      <div class="add-row">
        <input id="site-input" type="text" placeholder="ejemplo.com" autocomplete="off" />
        <button id="add-btn">Agregar</button>
      </div>
      <ul id="site-list"></ul>
    </div>
  </div>
  <script type="module" src="options.js"></script>
</body>
</html>
